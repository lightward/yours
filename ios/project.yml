# XcodeGen project definition — the .xcodeproj is generated, not committed.
# Run `bin/ios generate` (or `xcodegen generate` in this directory) after
# adding/removing files.
name: Yours
options:
  bundleIdPrefix: fyi.yours
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # set for device/TestFlight builds; simulator needs none
    YOURS_BASE_URL: ""    # set by bin/ios device for physical-device local dev
targets:
  Yours:
    type: application
    platform: iOS
    sources:
      - Yours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.yours.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIUserInterfaceStyle: ""
    info:
      path: Yours/Info.plist
      properties:
        CFBundleDisplayName: Yours
        UILaunchScreen:
          UIColorName: LaunchBackground
        # The custom scheme that carries sign-in back from the web flow
        CFBundleURLTypes:
          - CFBundleURLSchemes: [yours]
            CFBundleURLName: fyi.yours.auth
        YoursBaseURL: $(YOURS_BASE_URL)
        # Dev builds talk to the Rails server on localhost
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  YoursTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - YoursTests
    dependencies:
      - target: Yours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.yours.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Yours:
    build:
      targets:
        Yours: all
        YoursTests: [test]
    run:
      config: Debug
      # Local StoreKit products for simulator testing — no App Store Connect
      # needed. Replaced by real products in TestFlight/production.
      storeKitConfiguration: Yours.storekit
    test:
      config: Debug
      targets:
        - YoursTests
